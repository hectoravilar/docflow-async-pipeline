<!--
  DevOpsApp - página frontend estática
  
  Esta é uma página web simples hospedada no AWS S3 Bucket.
  
  Funcionalidades:
  - Exibe o título "DevOpsApp"
  - Consome uma API backend e exibe o resultado no centro da página
  - Utiliza jQuery para fazer requisições AJAX à API
  - Segue melhores práticas de usabilidade e design responsivo
  - Usa variável de template do Terraform para substituir o endpoint da API
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOpsApp</title>
    
    <!-- jQuery para requisições AJAX -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        /* Reset CSS básico */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Estilo do body com layout flexbox */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #537ab9 0%, #5989cb 100%);
        }
        
        /* Cabeçalho com fundo semi-transparente */
        header {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            text-align: center;
        }
        
        /* Título principal */
        h1 {
            color: white;
            font-size: 2.5rem;
        }
        
        /* Área principal centralizada */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Card de conteúdo */
        #content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        /* Área onde os dados da API são exibidos */
        #api-data {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #333;
            word-wrap: break-word;
        }
        
        /* Estados visuais */
        .loading { color: #667eea; }
        .error { color: #e74c3c; }
        
        /* Responsividade para dispositivos móveis */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            #content { padding: 20px; }
        }
    </style>
</head>
<body>
    <!-- Cabeçalho da página -->
    <header>
        <h1>DreamSquad</h1>
    </header>
    
    <!-- Conteúdo principal -->
    <main>
        <div id="content">
            <h2>API Response</h2>
            <div id="api-data" class="loading">Loading...</div>
        </div>
    </main>
    
    <script>
        // Executa quando o DOM estiver completamente carregado
        $(document).ready(function() {
            // Endpoint da API injetado pelo Terraform
            const apiEndpoint = '${api_endpoint}';
            
            // Faz requisição AJAX para a API
            $.ajax({
                url: apiEndpoint,
                method: 'GET',
                timeout: 10000, // Timeout de 10 segundos
                
                // Callback de sucesso
                success: function(data) {
                    $('#api-data').removeClass('loading')
                        .html('<strong>Random Number:</strong> ' + data.number);
                },
                
                // Callback de erro
                error: function(xhr, status, error) {
                    $('#api-data').removeClass('loading').addClass('error')
                        .text('Error loading data: ' + (error || 'Unable to connect to API'));
                }
            });
        });
    </script>
</body>
</html>
